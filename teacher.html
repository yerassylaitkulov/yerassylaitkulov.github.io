<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homework — Teacher</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0d0b;--surface:#1a1816;--surface2:#222018;
  --border:#2e2b26;--ink:#e8e4dc;--muted:#8a8680;--subtle:#3d3a35;
  --cyan:#06b6d4;--cyan-d:#0891b2;--cyan-bg:rgba(6,182,212,.08);
  --green:#5aaf7a;--green-bg:#0d1f14;onst
  --red:#e85a5a;--red-bg:#2a0f0f;
  --yellow:#f0c040;
  --r:8px;--rs:5px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:210px;flex-shrink:0;background:#090807;border-right:1px solid var(--border);display:flex;flex-direction:column}
.brand{padding:18px 18px 16px;font-size:17px;font-weight:600;border-bottom:1px solid var(--border);color:var(--ink);letter-spacing:-.3px}
.brand span{color:var(--cyan)}
.nav{display:flex;flex-direction:column;padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13.5px;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .12s}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--ink)}
.nav-item.active{background:var(--cyan-bg);color:var(--cyan);border-left-color:var(--cyan)}
.nav-icon{width:18px;text-align:center;flex-shrink:0;font-size:15px}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.view{display:none;padding:28px 32px;max-width:860px;width:100%}
.view.active{display:block}

/* ── VIEW HEADER ── */
.view-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.view-title{font-size:21px;font-weight:600}

/* ── BUTTONS ── */
.btn{padding:7px 15px;font-size:13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--ink);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;line-height:1.4}
.btn:hover{border-color:var(--muted)}
.btn.pri{background:var(--cyan-d);border-color:var(--cyan-d);color:#fff}
.btn.pri:hover{background:var(--cyan);border-color:var(--cyan)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── INPUTS ── */
input[type=text],input[type=date],input[type=number],textarea,select{
  font-family:inherit;font-size:14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--ink);padding:8px 11px;outline:none;transition:border-color .12s;width:100%
}
input:focus,textarea:focus,select:focus{border-color:var(--cyan)}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:72px}

/* ── FORM ── */
.inline-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px}
.fgroup{margin-bottom:12px}
.fgroup:last-child{margin-bottom:0}
.fgroup label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.form-row .fgroup{margin-bottom:0;flex:1;min-width:120px}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* ── STUDENTS ── */
.student-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;flex-wrap:wrap}
.student-name{font-weight:500;flex:0 0 160px;min-width:0}
.student-link{flex:1;font-size:11.5px;color:var(--muted);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.student-actions{display:flex;gap:6px;flex-shrink:0}

/* ── ASSIGNMENTS ── */
.assign-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;flex-wrap:wrap}
.assign-title{font-weight:500;flex:1;min-width:140px}
.assign-meta{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
.assign-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0}

/* ── BUILDER ── */
.builder-hd{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;padding:2px 6px;line-height:1;transition:color .12s}
.back-btn:hover{color:var(--ink)}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}

/* Question cards */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.q-card-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.qtype-badge{font-size:10px;padding:2px 7px;border-radius:99px;background:var(--surface2);color:var(--muted);flex-shrink:0}
.q-reorder{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.q-reorder button{background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 5px;line-height:1.3;font-size:11px;transition:color .1s}
.q-reorder button:hover{color:var(--ink)}
.options-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.option-row{display:flex;align-items:center;gap:8px}
.option-row input[type=radio]{width:auto;flex-shrink:0;accent-color:var(--cyan);cursor:pointer}
.option-row .opt-inp{flex:1}
.add-q-bar{display:flex;gap:8px;padding:12px;background:var(--surface2);border-radius:var(--r);margin-bottom:24px;flex-wrap:wrap;align-items:center}
.add-q-bar span{font-size:12px;color:var(--muted)}

/* Assign students section */
.assign-students-section{padding-top:20px;border-top:1px solid var(--border);margin-top:4px}
.checkbox-list{display:flex;flex-direction:column;gap:5px;margin:10px 0}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--surface2);border-radius:var(--rs);cursor:pointer;user-select:none}
.checkbox-item input[type=checkbox]{width:auto;accent-color:var(--cyan);cursor:pointer}

/* ── SUBMISSIONS TABLE ── */
.sub-table{width:100%;border-collapse:collapse}
.sub-table th,.sub-table td{text-align:left;padding:10px 13px;border-bottom:1px solid var(--border);font-size:13px}
.sub-table th{color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.sub-table tbody tr:hover td{background:var(--surface2)}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge-submitted{background:rgba(6,182,212,.15);color:var(--cyan)}
.badge-graded{background:var(--green-bg);color:var(--green)}
.badge-pending{background:var(--surface2);color:var(--muted)}

/* Grading panel */
.grading-q{padding:14px 0;border-bottom:1px solid var(--border)}
.grading-q:last-of-type{border-bottom:none}
.grading-q-text{font-weight:500;margin-bottom:8px;font-size:14px}
.ans-box{padding:8px 12px;border-radius:var(--rs);font-size:13px;margin-top:4px;border:1px solid transparent}
.ans-student{background:var(--surface2);border-color:var(--border)}
.ans-correct{background:var(--green-bg);border-color:rgba(90,175,122,.3);color:var(--green)}
.ans-wrong{background:var(--red-bg);border-color:rgba(232,90,90,.3);color:var(--red)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:600}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:2px}
.modal-close:hover{color:var(--ink)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 16px;font-size:13px;z-index:2000;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* ── LOADING / EMPTY ── */
.loading{display:flex;align-items:center;gap:10px;color:var(--muted);padding:20px 0}
.spinner{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--muted);padding:28px 0;text-align:center;font-size:13px}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="brand"><span>✦</span> Homework</div>
    <nav class="nav">
      <button class="nav-item active" id="nav-students" onclick="showView('students')">
        <span class="nav-icon">👤</span> Students
      </button>
      <button class="nav-item" id="nav-assignments" onclick="showView('assignments')">
        <span class="nav-icon">📝</span> Assignments
      </button>
    </nav>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- STUDENTS VIEW -->
    <section class="view active" id="v-students">
      <div class="view-hd">
        <h1 class="view-title">Students</h1>
        <button class="btn pri" onclick="toggleForm('add-student-form',this,'+ Add Student')">+ Add Student</button>
      </div>

      <div id="add-student-form" style="display:none" class="inline-form">
        <div class="form-row">
          <div class="fgroup">
            <label>Student Name</label>
            <input type="text" id="student-name-inp" placeholder="e.g. Aisha Nurlanovna"
              onkeydown="if(event.key==='Enter')addStudent()"/>
          </div>
          <button class="btn pri" id="add-student-btn" onclick="addStudent()">Add</button>
          <button class="btn" onclick="toggleForm('add-student-form',null,'+ Add Student')">Cancel</button>
        </div>
      </div>

      <div id="students-list">
        <div class="loading"><div class="spinner"></div> Loading students…</div>
      </div>
    </section>

    <!-- ASSIGNMENTS VIEW -->
    <section class="view" id="v-assignments">
      <div class="view-hd">
        <h1 class="view-title">Assignments</h1>
        <button class="btn pri" onclick="toggleForm('create-asgn-form',this,'+ New Assignment')">+ New Assignment</button>
      </div>

      <div id="create-asgn-form" style="display:none" class="inline-form">
        <div class="fgroup">
          <label>Title</label>
          <input type="text" id="asgn-title-inp" placeholder="e.g. Unit 3 Vocabulary"/>
        </div>
        <div class="form-row">
          <div class="fgroup">
            <label>Description (optional)</label>
            <input type="text" id="asgn-desc-inp" placeholder="Brief instructions…"/>
          </div>
          <div class="fgroup" style="flex:0 0 170px">
            <label>Due Date</label>
            <input type="date" id="asgn-due-inp"/>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn pri" id="create-asgn-btn" onclick="createAssignment()">Create</button>
          <button class="btn" onclick="toggleForm('create-asgn-form',null,'+ New Assignment')">Cancel</button>
        </div>
      </div>

      <div id="assignments-list">
        <div class="loading"><div class="spinner"></div> Loading assignments…</div>
      </div>
    </section>

    <!-- BUILDER VIEW -->
    <section class="view" id="v-builder">
      <div class="builder-hd">
        <button class="back-btn" onclick="showView('assignments')" title="Back">←</button>
        <h1 class="view-title" id="builder-title">Assignment Builder</h1>
      </div>

      <!-- Meta editing -->
      <div class="card" style="margin-bottom:22px">
        <div class="form-row" style="align-items:flex-start">
          <div class="fgroup">
            <label>Title</label>
            <input type="text" id="b-title"/>
          </div>
          <div class="fgroup">
            <label>Description</label>
            <input type="text" id="b-desc"/>
          </div>
          <div class="fgroup" style="flex:0 0 145px">
            <label>Due Date</label>
            <input type="date" id="b-due"/>
          </div>
          <button class="btn pri" onclick="saveBuilderMeta()" style="align-self:flex-end">Save</button>
        </div>
      </div>

      <!-- Questions list -->
      <div class="section-label">Questions</div>
      <div id="questions-list"></div>

      <!-- Add question buttons -->
      <div class="add-q-bar">
        <span>Add question:</span>
        <button class="btn sm" onclick="addQuestion('multiple_choice')">Multiple Choice</button>
        <button class="btn sm" onclick="addQuestion('fill_blank')">Fill in the Blank</button>
        <button class="btn sm" onclick="addQuestion('short_answer')">Short Answer</button>
      </div>

      <!-- Assign to students -->
      <div class="assign-students-section">
        <div class="section-label">Assign to Students</div>
        <div id="assign-student-list" class="checkbox-list"></div>
        <button class="btn pri" onclick="saveAssignments()" style="margin-top:4px">Save Assignments</button>
      </div>
    </section>

    <!-- SUBMISSIONS VIEW -->
    <section class="view" id="v-submissions">
      <div class="builder-hd">
        <button class="back-btn" onclick="showView('assignments')" title="Back">←</button>
        <h1 class="view-title" id="submissions-title">Submissions</h1>
      </div>
      <div id="submissions-content"></div>
    </section>

  </main>
</div>

<!-- ── GRADING MODAL ── -->
<div id="grading-modal" class="modal-overlay" style="display:none"
  onclick="if(event.target===this)closeGradingModal()">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="grading-title">Grade Submission</span>
      <button class="modal-close" onclick="closeGradingModal()">×</button>
    </div>
    <div id="grading-body"></div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURATION — paste your Supabase values here
// ═══════════════════════════════════════════════
const SUPABASE_URL  = 'https://qqqjiwrfudcvsjcxeavd.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxcWppd3JmdWRjdnNqY3hlYXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTgxMDAsImV4cCI6MjA5MDg5NDEwMH0.hvUN1MAP32eF-4sbjpQXRFWRyf3prsDjDGu_vzwvpyo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let students          = [];   // all students
let assignments       = [];   // all assignments
let currentAsgn       = null; // assignment id open in builder/submissions
let currentItems      = [];   // questions in builder
let assignedStudents  = new Set(); // student ids assigned in builder

// grading state
let gradingSubId   = null;
let gradingItems   = [];
let gradingSub     = null;

// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3200);
}

function fmt(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function studentLink(token) {
  // Build link relative to this file — works locally and on GitHub Pages
  const base = location.href.replace(/[^/]*$/, '');
  return `${base}student.html?t=${token}`;
}

function genToken() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from({length: 16}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function toggleForm(id, triggerBtn, defaultLabel) {
  const el = document.getElementById(id);
  const shown = el.style.display !== 'none';
  el.style.display = shown ? 'none' : 'block';
  // Refocus first input when opening
  if (!shown) {
    setTimeout(() => el.querySelector('input')?.focus(), 50);
  }
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const v = document.getElementById(`v-${name}`);
  const n = document.getElementById(`nav-${name}`);
  if (v) v.classList.add('active');
  if (n) n.classList.add('active');

  if (name === 'students')    loadStudents();
  if (name === 'assignments') loadAssignments();
}

// ═══════════════════════════════════════════════
//  STUDENTS
// ═══════════════════════════════════════════════
async function loadStudents() {
  const el = document.getElementById('students-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const { data, error } = await sb.from('students').select('*').order('created_at');
    if (error) throw error;
    students = data || [];
    renderStudents();
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${esc(e.message)}</div>`;
  }
}

function renderStudents() {
  const el = document.getElementById('students-list');
  if (!students.length) {
    el.innerHTML = '<div class="empty">No students yet. Add one above.</div>';
    return;
  }
  el.innerHTML = students.map(s => {
    const link = studentLink(s.token);
    return `
    <div class="student-item">
      <span class="student-name">${esc(s.name)}</span>
      <span class="student-link" title="${esc(link)}">${esc(link)}</span>
      <div class="student-actions">
        <button class="btn sm" onclick="copyLink('${esc(link)}')">Copy Link</button>
        <button class="btn sm danger" onclick="deleteStudent('${s.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function addStudent() {
  const name = document.getElementById('student-name-inp').value.trim();
  if (!name) { toast('Enter a name', 'err'); return; }
  const btn = document.getElementById('add-student-btn');
  btn.disabled = true; btn.textContent = 'Adding…';
  try {
    const { error } = await sb.from('students').insert({ name, token: genToken() });
    if (error) throw error;
    document.getElementById('student-name-inp').value = '';
    document.getElementById('add-student-form').style.display = 'none';
    toast(`Added ${name}`);
    loadStudents();
  } catch (e) {
    toast(e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Add';
  }
}

async function deleteStudent(id) {
  const s = students.find(x => x.id === id);
  if (!confirm(`Delete "${s?.name || 'student'}"? This cannot be undone.`)) return;
  try {
    const { error } = await sb.from('students').delete().eq('id', id);
    if (error) throw error;
    toast('Student deleted');
    loadStudents();
  } catch (e) {
    toast(e.message, 'err');
  }
}

function copyLink(link) {
  navigator.clipboard.writeText(link)
    .then(() => toast('Link copied!'))
    .catch(() => toast('Could not copy — try manually', 'err'));
}

// ═══════════════════════════════════════════════
//  ASSIGNMENTS
// ═══════════════════════════════════════════════
async function loadAssignments() {
  const el = document.getElementById('assignments-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const [{ data: asgns, error }, { data: sa }, { data: subs }] = await Promise.all([
      sb.from('assignments').select('*').order('created_at', { ascending: false }),
      sb.from('student_assignments').select('assignment_id'),
      sb.from('submissions').select('assignment_id'),
    ]);
    if (error) throw error;
    assignments = asgns || [];

    // Build count maps
    const assigned  = {};
    const submitted = {};
    (sa   || []).forEach(r => { assigned[r.assignment_id]  = (assigned[r.assignment_id]  || 0) + 1; });
    (subs || []).forEach(r => { submitted[r.assignment_id] = (submitted[r.assignment_id] || 0) + 1; });

    renderAssignments(assigned, submitted);
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${esc(e.message)}</div>`;
  }
}

function renderAssignments(assigned, submitted) {
  const el = document.getElementById('assignments-list');
  if (!assignments.length) {
    el.innerHTML = '<div class="empty">No assignments yet. Create one above.</div>';
    return;
  }
  el.innerHTML = assignments.map(a => `
    <div class="assign-item">
      <div class="assign-title">${esc(a.title)}</div>
      <div class="assign-meta">
        <span>Due: ${fmt(a.due_date)}</span>
        <span>${assigned[a.id] || 0} assigned</span>
        <span>${submitted[a.id] || 0} submitted</span>
      </div>
      <div class="assign-actions">
        <button class="btn sm" onclick="openBuilder('${a.id}')">Build</button>
        <button class="btn sm" onclick="openSubmissions('${a.id}')">Submissions</button>
        <button class="btn sm danger" onclick="deleteAssignment('${a.id}')">Delete</button>
      </div>
    </div>`).join('');
}

async function createAssignment() {
  const title = document.getElementById('asgn-title-inp').value.trim();
  if (!title) { toast('Enter a title', 'err'); return; }
  const description = document.getElementById('asgn-desc-inp').value.trim() || null;
  const due_date    = document.getElementById('asgn-due-inp').value || null;
  const btn = document.getElementById('create-asgn-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const { data, error } = await sb.from('assignments')
      .insert({ title, description, due_date }).select().single();
    if (error) throw error;
    document.getElementById('asgn-title-inp').value = '';
    document.getElementById('asgn-desc-inp').value  = '';
    document.getElementById('asgn-due-inp').value   = '';
    document.getElementById('create-asgn-form').style.display = 'none';
    toast('Assignment created');
    await loadAssignments();
    // Jump straight into builder
    openBuilder(data.id);
  } catch (e) {
    toast(e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Create';
  }
}

async function deleteAssignment(id) {
  const a = assignments.find(x => x.id === id);
  if (!confirm(`Delete "${a?.title || 'assignment'}"? This cannot be undone.`)) return;
  try {
    const { error } = await sb.from('assignments').delete().eq('id', id);
    if (error) throw error;
    toast('Deleted');
    loadAssignments();
  } catch (e) {
    toast(e.message, 'err');
  }
}

// ═══════════════════════════════════════════════
//  BUILDER
// ═══════════════════════════════════════════════
async function openBuilder(id) {
  currentAsgn = id;
  showView('builder');

  // Fill meta fields
  let a = assignments.find(x => x.id === id);
  if (!a) {
    const { data } = await sb.from('assignments').select('*').eq('id', id).single();
    a = data;
  }
  if (a) {
    document.getElementById('builder-title').textContent = a.title;
    document.getElementById('b-title').value = a.title;
    document.getElementById('b-desc').value  = a.description || '';
    document.getElementById('b-due').value   = a.due_date    || '';
  }

  await loadItems();

  // Load students if not already loaded
  if (!students.length) {
    const { data } = await sb.from('students').select('*').order('created_at');
    students = data || [];
  }

  // Load which students are currently assigned
  const { data: sa } = await sb.from('student_assignments')
    .select('student_id').eq('assignment_id', id);
  assignedStudents = new Set((sa || []).map(r => r.student_id));
  renderAssignStudents();
}

async function loadItems() {
  const el = document.getElementById('questions-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const { data, error } = await sb.from('items')
    .select('*').eq('assignment_id', currentAsgn).order('order_index');
  if (error) { el.innerHTML = `<div class="empty" style="color:var(--red)">${esc(error.message)}</div>`; return; }
  currentItems = data || [];
  renderQuestions();
}

function renderQuestions() {
  const el = document.getElementById('questions-list');
  if (!currentItems.length) {
    el.innerHTML = '<div class="empty" style="padding:14px 0">No questions yet. Add one below.</div>';
    return;
  }
  el.innerHTML = currentItems.map((item, i) => questionCardHtml(item, i)).join('');
}

function questionCardHtml(item, i) {
  const typeLabels = { multiple_choice: 'Multiple Choice', fill_blank: 'Fill in the Blank', short_answer: 'Short Answer' };
  const label = typeLabels[item.type] || item.type;
  let body = '';

  if (item.type === 'multiple_choice') {
    const opts = item.options || [];
    body = `
      <div class="fgroup">
        <label>Question text</label>
        <input type="text" value="${esc(item.question)}" placeholder="e.g. What tense is this sentence?"
          oninput="setItemField('${item.id}','question',this.value)"/>
      </div>
      <div style="margin-top:10px">
        <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px">Options — select the correct one</label>
        <div class="options-list">
          ${[0,1,2,3,4,5].map(j => `
            <div class="option-row">
              <input type="radio" name="cor-${item.id}" value="${j}"
                ${String(item.correct_answer) === String(j) ? 'checked' : ''}
                onchange="setItemField('${item.id}','correct_answer','${j}')"/>
              <input type="text" class="opt-inp" value="${esc(opts[j] || '')}" placeholder="Option ${j+1}"
                oninput="setItemOption('${item.id}',${j},this.value)"/>
            </div>`).join('')}
        </div>
      </div>`;
  } else if (item.type === 'fill_blank') {
    body = `
      <div class="fgroup">
        <label>Question (use ___ for the blank)</label>
        <input type="text" value="${esc(item.question)}" placeholder="e.g. She ___ to school every day."
          oninput="setItemField('${item.id}','question',this.value)"/>
      </div>
      <div class="fgroup">
        <label>Correct Answer</label>
        <input type="text" value="${esc(item.correct_answer || '')}" placeholder="goes"
          oninput="setItemField('${item.id}','correct_answer',this.value)"/>
      </div>`;
  } else {
    body = `
      <div class="fgroup">
        <label>Question text</label>
        <input type="text" value="${esc(item.question)}" placeholder="Write your question here…"
          oninput="setItemField('${item.id}','question',this.value)"/>
      </div>
      <p style="font-size:12px;color:var(--muted)">Short answer — you grade this manually.</p>`;
  }

  return `
    <div class="q-card" id="qc-${item.id}">
      <div class="q-card-hd">
        <div class="q-reorder">
          <button onclick="moveQ('${item.id}',-1)" title="Move up">▲</button>
          <button onclick="moveQ('${item.id}',1)"  title="Move down">▼</button>
        </div>
        <span style="font-size:12px;color:var(--muted)">Q${i+1}</span>
        <span class="qtype-badge">${label}</span>
        <button class="btn sm danger" style="margin-left:auto" onclick="deleteQ('${item.id}')">Delete</button>
      </div>
      ${body}
      <button class="btn sm pri" onclick="saveQ('${item.id}')" style="margin-top:10px">Save question</button>
    </div>`;
}

function renderAssignStudents() {
  const el = document.getElementById('assign-student-list');
  if (!students.length) {
    el.innerHTML = '<div class="empty" style="padding:8px 0">No students yet — add them first.</div>';
    return;
  }
  el.innerHTML = students.map(s => `
    <label class="checkbox-item">
      <input type="checkbox" value="${s.id}" ${assignedStudents.has(s.id) ? 'checked' : ''}/>
      ${esc(s.name)}
    </label>`).join('');
}

async function saveBuilderMeta() {
  const title = document.getElementById('b-title').value.trim();
  if (!title) { toast('Title required', 'err'); return; }
  try {
    const { error } = await sb.from('assignments').update({
      title,
      description: document.getElementById('b-desc').value.trim() || null,
      due_date:    document.getElementById('b-due').value || null,
    }).eq('id', currentAsgn);
    if (error) throw error;
    document.getElementById('builder-title').textContent = title;
    // Update local cache
    const a = assignments.find(x => x.id === currentAsgn);
    if (a) { a.title = title; }
    toast('Saved');
  } catch (e) {
    toast(e.message, 'err');
  }
}

// In-memory mutation before DB save
function setItemField(id, field, value) {
  const item = currentItems.find(x => x.id === id);
  if (item) item[field] = value;
}

function setItemOption(id, idx, value) {
  const item = currentItems.find(x => x.id === id);
  if (!item) return;
  const opts = [...(item.options || Array(6).fill(''))];
  while (opts.length < 6) opts.push('');
  opts[idx] = value;
  item.options = opts;
}

async function addQuestion(type) {
  try {
    const { data, error } = await sb.from('items').insert({
      assignment_id: currentAsgn,
      type,
      question: '',
      options: type === 'multiple_choice' ? Array(6).fill('') : null,
      correct_answer: null,
      order_index: currentItems.length,
    }).select().single();
    if (error) throw error;
    currentItems.push(data);
    renderQuestions();
    setTimeout(() => document.getElementById(`qc-${data.id}`)?.scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);
  } catch (e) {
    toast(e.message, 'err');
  }
}

async function saveQ(id) {
  const item = currentItems.find(x => x.id === id);
  if (!item) return;
  try {
    const { error } = await sb.from('items').update({
      question:       item.question,
      options:        item.options,
      correct_answer: item.correct_answer,
    }).eq('id', id);
    if (error) throw error;
    toast('Question saved');
  } catch (e) {
    toast(e.message, 'err');
  }
}

async function deleteQ(id) {
  if (!confirm('Delete this question?')) return;
  try {
    const { error } = await sb.from('items').delete().eq('id', id);
    if (error) throw error;
    currentItems = currentItems.filter(x => x.id !== id);
    await reorderItems();
    renderQuestions();
    toast('Deleted');
  } catch (e) {
    toast(e.message, 'err');
  }
}

async function moveQ(id, dir) {
  const i = currentItems.findIndex(x => x.id === id);
  const j = i + dir;
  if (j < 0 || j >= currentItems.length) return;
  [currentItems[i], currentItems[j]] = [currentItems[j], currentItems[i]];
  await reorderItems();
  renderQuestions();
}

async function reorderItems() {
  await Promise.all(currentItems.map((item, i) =>
    sb.from('items').update({ order_index: i }).eq('id', item.id)
  ));
}

async function saveAssignments() {
  const boxes = document.querySelectorAll('#assign-student-list input[type=checkbox]');
  const selected = new Set([...boxes].filter(b => b.checked).map(b => b.value));
  const toAdd    = [...selected].filter(id => !assignedStudents.has(id));
  const toRemove = [...assignedStudents].filter(id => !selected.has(id));
  try {
    if (toRemove.length) {
      const { error } = await sb.from('student_assignments')
        .delete().eq('assignment_id', currentAsgn).in('student_id', toRemove);
      if (error) throw error;
    }
    if (toAdd.length) {
      const { error } = await sb.from('student_assignments')
        .insert(toAdd.map(sid => ({ student_id: sid, assignment_id: currentAsgn })));
      if (error) throw error;
    }
    assignedStudents = selected;
    toast('Assignments saved');
  } catch (e) {
    toast(e.message, 'err');
  }
}

// ═══════════════════════════════════════════════
//  SUBMISSIONS
// ═══════════════════════════════════════════════
async function openSubmissions(id) {
  currentAsgn = id;
  showView('submissions');
  const a = assignments.find(x => x.id === id);
  document.getElementById('submissions-title').textContent =
    `Submissions — ${a ? esc(a.title) : '…'}`;

  const el = document.getElementById('submissions-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const [{ data: sa, error: e1 }, { data: subs, error: e2 }] = await Promise.all([
      sb.from('student_assignments')
        .select('student_id, students(id, name)')
        .eq('assignment_id', id),
      sb.from('submissions').select('*').eq('assignment_id', id),
    ]);
    if (e1) throw e1;
    if (e2) throw e2;

    if (!sa || !sa.length) {
      el.innerHTML = '<div class="empty">No students assigned to this assignment.</div>';
      return;
    }

    const subMap = {};
    (subs || []).forEach(s => { subMap[s.student_id] = s; });

    el.innerHTML = `
      <table class="sub-table">
        <thead><tr>
          <th>Student</th><th>Status</th><th>Score</th><th>Submitted</th><th>Action</th>
        </tr></thead>
        <tbody>
          ${sa.map(row => {
            const st  = row.students;
            const sub = subMap[st.id];
            const statusHtml = sub
              ? sub.status === 'graded'
                ? '<span class="badge badge-graded">Graded</span>'
                : '<span class="badge badge-submitted">Submitted</span>'
              : '<span class="badge badge-pending">Not submitted</span>';
            const scoreHtml = (sub && sub.status === 'graded')
              ? `${sub.score} / ${sub.max_score}` : '—';
            const dateHtml = sub
              ? new Date(sub.submitted_at).toLocaleDateString() : '—';
            const actionHtml = sub
              ? `<button class="btn sm" onclick="openGrading('${sub.id}','${esc(st.name)}')">
                  ${sub.status === 'graded' ? 'Edit Grade' : 'Grade'}
                </button>`
              : '—';
            return `<tr>
              <td>${esc(st.name)}</td>
              <td>${statusHtml}</td>
              <td>${scoreHtml}</td>
              <td>${dateHtml}</td>
              <td>${actionHtml}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${esc(e.message)}</div>`;
  }
}

// ═══════════════════════════════════════════════
//  GRADING MODAL
// ═══════════════════════════════════════════════
async function openGrading(subId, studentName) {
  gradingSubId = subId;
  document.getElementById('grading-title').textContent = `Grade — ${studentName}`;
  document.getElementById('grading-body').innerHTML =
    '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('grading-modal').style.display = 'flex';

  try {
    const [{ data: sub, error: e1 }, { data: items, error: e2 }] = await Promise.all([
      sb.from('submissions').select('*').eq('id', subId).single(),
      // items loaded after sub so we know assignment_id
      Promise.resolve({ data: null, error: null }),
    ]);
    if (e1) throw e1;
    gradingSub = sub;

    const { data: its, error: e3 } = await sb.from('items')
      .select('*').eq('assignment_id', sub.assignment_id).order('order_index');
    if (e3) throw e3;
    gradingItems = its || [];

    renderGradingModal();
  } catch (e) {
    document.getElementById('grading-body').innerHTML =
      `<div style="color:var(--red)">${esc(e.message)}</div>`;
  }
}

function renderGradingModal() {
  const sub     = gradingSub;
  const answers = sub.answers || {};
  const items   = gradingItems;

  // Auto-score MC + fill_blank
  let autoScore = 0, autoMax = 0;
  items.forEach(item => {
    if (item.type === 'short_answer') return;
    autoMax++;
    const given   = String(answers[item.id] || '').trim().toLowerCase();
    const correct = String(item.correct_answer || '').trim().toLowerCase();
    if (given === correct) autoScore++;
  });

  const totalMax = items.length;

  let html = `
    <div style="background:var(--surface2);border-radius:var(--rs);padding:12px;margin-bottom:18px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:2px">Auto-score (MC + Fill Blank)</div>
      <div style="font-size:22px;font-weight:600">${autoScore} <span style="color:var(--muted);font-size:14px">/ ${autoMax}</span></div>
    </div>`;

  items.forEach((item, i) => {
    const typeLabel = { multiple_choice:'MC', fill_blank:'Fill', short_answer:'Short' }[item.type];
    const ans = answers[item.id] || '';
    let ansHtml = '';

    if (item.type === 'multiple_choice') {
      const opts     = item.options || [];
      const givenIdx = parseInt(ans);
      const corrIdx  = parseInt(item.correct_answer);
      const correct  = givenIdx === corrIdx;
      const givenTxt = opts[givenIdx] != null ? opts[givenIdx] : `Option ${givenIdx+1}`;
      const corrTxt  = opts[corrIdx]  != null ? opts[corrIdx]  : `Option ${corrIdx+1}`;
      ansHtml = `
        <div class="ans-box ans-student">Student: ${esc(givenTxt) || '<em style="color:var(--muted)">No answer</em>'}</div>
        <div class="ans-box ${correct ? 'ans-correct' : 'ans-wrong'}">Correct: ${esc(corrTxt)}</div>`;
    } else if (item.type === 'fill_blank') {
      const given   = String(ans).trim().toLowerCase();
      const correct = String(item.correct_answer || '').trim().toLowerCase();
      const isOk    = given === correct;
      ansHtml = `
        <div class="ans-box ans-student">Student: ${esc(ans) || '<em style="color:var(--muted)">No answer</em>'}</div>
        <div class="ans-box ${isOk ? 'ans-correct' : 'ans-wrong'}">Correct: ${esc(item.correct_answer)}</div>`;
    } else {
      // Short answer — show response + score input
      const savedScore = answers[`sa_${item.id}`] ?? '';
      ansHtml = `
        <div class="ans-box ans-student">${esc(ans) || '<em style="color:var(--muted)">No answer</em>'}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
          <label style="font-size:12px;color:var(--muted)">Points:</label>
          <input type="number" id="sa-${item.id}" value="${esc(savedScore)}"
            min="0" max="1" style="width:70px" placeholder="0"/>
          <span style="font-size:12px;color:var(--muted)">/ 1</span>
        </div>`;
    }

    html += `
      <div class="grading-q">
        <div class="grading-q-text">
          Q${i+1} <span style="font-size:11px;color:var(--muted)">[${typeLabel}]</span>
          ${esc(item.question)}
        </div>
        ${ansHtml}
      </div>`;
  });

  html += `
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="fgroup">
        <label>Total Score</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="number" id="total-score" value="${sub.score ?? autoScore}"
            min="0" max="${totalMax}" style="width:90px"/>
          <span style="color:var(--muted)">/ ${totalMax}</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">
          Auto-calculated or override manually (include short answer points above)
        </div>
      </div>
      <div class="fgroup">
        <label>Written Feedback (optional)</label>
        <textarea id="feedback-inp" placeholder="Well done! Work on…">${esc(sub.feedback || '')}</textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn pri" onclick="saveGrade(${totalMax})">Save Grade</button>
        <button class="btn" onclick="closeGradingModal()">Cancel</button>
      </div>
    </div>`;

  document.getElementById('grading-body').innerHTML = html;
}

async function saveGrade(maxScore) {
  const score    = parseInt(document.getElementById('total-score').value) || 0;
  const feedback = document.getElementById('feedback-inp').value.trim();

  // Persist short answer point overrides back into answers JSONB
  const updatedAnswers = { ...gradingSub.answers };
  gradingItems.filter(i => i.type === 'short_answer').forEach(item => {
    const inp = document.getElementById(`sa-${item.id}`);
    if (inp) updatedAnswers[`sa_${item.id}`] = parseInt(inp.value) || 0;
  });

  try {
    const { error } = await sb.from('submissions').update({
      score,
      max_score: maxScore,
      feedback,
      answers: updatedAnswers,
      status: 'graded',
      graded_at: new Date().toISOString(),
    }).eq('id', gradingSubId);
    if (error) throw error;
    toast('Grade saved');
    closeGradingModal();
    openSubmissions(currentAsgn); // refresh submissions table
  } catch (e) {
    toast(e.message, 'err');
  }
}

function closeGradingModal() {
  document.getElementById('grading-modal').style.display = 'none';
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
loadStudents();
</script>
</body>
</html>
